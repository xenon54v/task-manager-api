<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="page">
        <header class="header">
            <div>
                <p class="eyebrow">FastAPI project</p>
                <h1>Task Manager</h1>
                <p class="subtitle">
                    A personal task manager with user registration, authentication, and JWT-based access control.
                </p>
            </div>

            <div class="status-card">
                <span class="status-dot"></span>
                <span id="user-status">Guest</span>
            </div>
        </header>

        <main class="layout">
            <section class="card auth-card" id="auth-section">
                <div class="tabs">
                    <button class="tab active" id="login-tab">Login</button>
                    <button class="tab" id="register-tab">Register</button>
                </div>

                <form id="auth-form" class="form">
                    <label>
                        Username
                        <input
                            type="text"
                            id="username"
                            placeholder="For example, ksenia"
                            autocomplete="username"
                            required
                        >
                    </label>

                    <label>
                        Password
                        <input
                            type="password"
                            id="password"
                            placeholder="At least 6 characters"
                            autocomplete="current-password"
                            required
                        >
                    </label>

                    <button type="submit" class="primary-btn" id="auth-submit">
                        Login
                    </button>
                </form>

                <p class="hint" id="auth-hint">
                    Don't have an account? Switch to the Register tab.
                </p>

                <div class="message" id="auth-message"></div>
            </section>

            <section class="card tasks-card hidden" id="tasks-section">
                <div class="tasks-header">
                    <div>
                        <p class="eyebrow">What do you want to do?</p>
                        <h2>My Tasks</h2>
                    </div>

                    <button class="secondary-btn" id="logout-btn">
                        Logout
                    </button>
                </div>

                <form id="task-form" class="task-form">
                    <input
                        type="text"
                        id="task-title"
                        placeholder="Task title"
                        required
                    >

                    <input
                        type="text"
                        id="task-description"
                        placeholder="Description, optional"
                    >

                    <button type="submit" class="primary-btn">
                        Add
                    </button>
                </form>

                <div class="message" id="task-message"></div>

                <div class="task-stats">
                    <span id="total-count">Total: 0</span>
                    <span id="done-count">Completed: 0</span>
                </div>

                <div id="tasks-list" class="tasks-list"></div>
            </section>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
